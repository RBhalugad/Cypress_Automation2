name: Cypress UI Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'cypress/e2e/ui/**'
      - 'cypress/pages/**'
      - 'cypress/support/**'
      - 'cypress/fixtures/**'
      - 'cypress.config.ts'
  pull_request:
    branches: [main]
    paths:
      - 'cypress/e2e/ui/**'
      - 'cypress/pages/**'
      - 'cypress/support/**'
      - 'cypress/fixtures/**'
      - 'cypress.config.ts'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Select the browser to run tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
          - electron
      record:
        description: 'Record tests to Cypress Cloud'
        required: true
        type: boolean
        default: true

jobs:
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cypress UI Tests
        uses: cypress-io/github-action@v7
        with:
          install: false
          record: ${{ github.event.inputs.record || true }}
          parallel: true
          browser: ${{ github.event.inputs.browser || 'chrome' }}
          spec: 'cypress/e2e/ui/**/*.spec.ts'
          group: 'UI Tests'
        env:
          CYPRESS_baseurl: ${{ secrets.CYPRESS_BASEURL }}
          CYPRESS_ecom_user: ${{ secrets.CYPRESS_ECOM_USER }}
          CYPRESS_ecom_password: ${{ secrets.CYPRESS_ECOM_PASSWORD }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-test-screenshots-${{ matrix.containers }}
          path: cypress/screenshots
          retention-days: 3

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-test-videos-${{ matrix.containers }}
          path: cypress/videos
          retention-days: 3

      - name: Upload Cypress Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-reports-${{ matrix.containers }}
          path: cypress/reports
          retention-days: 5
